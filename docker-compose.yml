version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-warehouse}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-warehouse}?schema=public

      # Добавь сюда свои auth-переменные, если они у тебя используются:
      # JWT_SECRET: ${JWT_SECRET}
      # SESSION_SECRET: ${SESSION_SECRET}
      # AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "3000:3000"

volumes:
  postgres_data: